<!DOCTYPE html>
<html lang="en" id="theme-root" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}No Middlemen Marketplace{% endblock %}</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#198754">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* 🌗 ABSOLUTE HIGH-CONTRAST CONTROLS */
        [data-theme="light"] { 
            --bg-main: #f8f9fa; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --card-bg: #ffffff;
            --border-line: #cbd5e1;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --chip-bg: #ffffff;
        }
        [data-theme="dark"] { 
            --bg-main: #0d0f12; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --card-bg: #161920; 
            --border-line: #334155; 
            --input-bg: #1e293b; 
            --input-text: #f8fafc; 
            --chip-bg: #161920;
        }
        
        body { 
            background-color: var(--bg-main) !important; 
            color: var(--text-main) !important;
            font-family: system-ui, -apple-system, sans-serif; 
            padding-top: 130px !important; 
            padding-bottom: 85px !important; 
            margin: 0;
        }

        /* Prevent system overrides from blending text colors into backgrounds */
        h1, h2, h3, h4, h5, h6, p, span, label, legend, strong, td, th, .card-title, .form-label { 
            color: var(--text-main) !important; 
        }
        small, .text-muted, .text-secondary { 
            color: var(--text-muted) !important; 
        }

        /* FIXED ELEMENTS SETUP */
        .mobile-top-bar { 
            background-color: #101214 !important; 
            border-bottom: 2px solid #198754; 
            position: fixed; 
            top: 0; 
            left: 0;
            right: 0;
            z-index: 1050; 
        }
        
        .mobile-bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 65px; 
            background-color: #101214 !important; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            z-index: 1050; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
        }
        
        .bottom-nav-item { 
            text-decoration: none !important; 
            font-size: 0.75rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #94a3b8 !important;
        }
        .bottom-nav-item i { font-size: 1.4rem; margin-bottom: 1px; color: #94a3b8 !important; display: block !important; }
        .bottom-nav-item.active, .bottom-nav-item.active i, .bottom-nav-item.active span { color: #2ecc71 !important; }

        /* HORIZONTAL SWIPER CHIPS */
        .category-swiper { display: flex; overflow-x: auto; scrollbar-width: none; gap: 10px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .category-swiper::-webkit-scrollbar { display: none; }
        .category-chip { background: var(--chip-bg) !important; border: 1px solid var(--border-line) !important; padding: 8px 16px; border-radius: 50px; white-space: nowrap; font-size: 0.88rem; font-weight: 600; text-decoration: none !important; color: var(--text-main) !important; display: inline-flex; align-items: center; gap: 6px; }

       .filter-select { 
    background-color: var(--input-bg) !important; 
    color: var(--input-text) !important; 
    border: 1px solid var(--border-line) !important; 
    font-size: 0.85rem; 
    height: 42px;
    /* 🚨 FORCE NATIVE SELECT ARROW VISIBILITY IN DARK THEMES */
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
    background-repeat: no-repeat !important;
    background-position: right 0.75rem center !important;
    background-size: 16px 12px !important;
    appearance: none !important;
    -webkit-appearance: none !important;
    -moz-appearance: none !important;
    padding-right: 2rem !important;
}
    </style>
</head>
<body>

    <div class="mobile-top-bar px-3 py-2 shadow-sm">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-link text-white p-0 fs-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#leftDrawerMenu"><i class="bi bi-list"></i></button>
                <a href="{% url 'listings:list' %}" class="text-decoration-none fw-bold fs-5 text-white ms-1">🛑 NO <span style="color: #2ecc71;">MIDDLEMEN</span></a>
            </div>
            <a href="{% url 'dashboard:index' %}?tab=alerts" class="text-white"><i class="bi bi-bell fs-4"></i></a>
        </div>
        <form method="GET" action="{% url 'listings:list' %}" class="mt-2 m-0">
            <div class="input-group input-group-sm">
                <span class="input-group-text border-0 bg-secondary text-white-50"><i class="bi bi-search"></i></span>
                <input type="text" name="q" value="{{ request.GET.q }}" class="form-control border-0 bg-secondary text-white" placeholder="Search assets directly...">
            </div>
        </form>
    </div>

    <div class="offcanvas offcanvas-start drawer-slide" tabindex="-1" id="leftDrawerMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title fw-bold text-success">☰ MENU</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="list-group list-group-flush">
                <a href="{% url 'listings:list' %}" class="list-group-item bg-transparent text-white border-0 py-3 px-4">Home</a>
                <a href="{% url 'listings:list' %}?browse=true" class="list-group-item bg-transparent text-white border-0 py-3 px-4">Browse Assets</a>
                <a href="{% url 'accounts:settings_dashboard' %}" class="list-group-item bg-transparent text-white border-0 py-3 px-4">Account Settings</a>
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="mobile-bottom-nav">
        <a href="{% url 'listings:list' %}" class="bottom-nav-item active">
            <i class="bi bi-house-door-fill"></i><span>Home</span>
        </a>
        <a href="{% url 'listings:list' %}?browse=true" class="bottom-nav-item">
            <i class="bi bi-search"></i><span>Search</span>
        </a>
        <a href="{% url 'listings:create' %}" class="bottom-nav-item text-success">
            <i class="bi bi-plus-circle-fill fs-2"></i><span>List</span>
        </a>
        <a href="{% url 'dashboard:index' %}?tab=messages" class="bottom-nav-item">
            <i class="bi bi-chat-dots-fill"></i><span>Chats</span>
        </a>
        <a href="{% url 'accounts:settings_dashboard' %}" class="bottom-nav-item">
            <i class="bi bi-person-circle"></i><span>Account</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
