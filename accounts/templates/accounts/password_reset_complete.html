{% extends 'base.html' %}
{% block title %}Password Updated - No Middlemen{% endblock %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5 text-center">
        <div class="card shadow-sm border p-5 rounded-4 bg-white">
            <div class="text-success display-4 mb-3"><i class="bi bi-check-circle-fill"></i></div>
            <h4 class="fw-bold text-dark mb-2">Password Changed Successfully!</h4>
            <p class="text-muted small mb-4">Your login security credentials have been updated globally across our relational database layers.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-success w-100 fw-bold rounded-3 py-2">
                Sign In to Your Profile →
            </a>
        </div>
    </div>
</div>
{% endblock %}
