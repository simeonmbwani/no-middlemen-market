{% extends 'base.html' %}
{% block title %}Reset Password - No Middlemen{% endblock %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5">
        <div class="card shadow-sm border p-4 rounded-4 bg-white">
            <h4 class="fw-bold text-dark mb-1">Reset Password</h4>
            <p class="text-muted small mb-4">Enter your registered email address, and our system will send you a secure cryptographic reset token link instantly.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Email Address</label>
                    <input type="email" name="email" class="form-control" autocomplete="email" required placeholder="name@domain.com">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold rounded-3 py-2 animated-btn">
                    Send Secure Reset Link
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
