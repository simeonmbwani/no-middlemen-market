<div id="msg-corridor" class="p-3 flex-grow-1 overflow-y-auto d-flex flex-column gap-2" style="background-color: var(--bg-main); background-image: radial-gradient(rgba(25,135,84,0.04) 1px, transparent 0); background-size: 24px 24px;">
    {% for message in messages_list %}
        {% if message.sender == request.user %}
            <div class="align-self-end p-2 shadow-sm position-relative text-white" style="background-color: #115e3b !important; max-width: 85%; min-width: 110px; border-radius: 12px 0px 12px 12px; padding-bottom: 20px !important;">
                <p class="m-0 pe-2 text-white" style="font-size: 0.92rem; line-height: 1.4; color: #ffffff !important;">{{ message.message_text }}</p>
                <div class="position-absolute bottom-0 end-0 pe-2 pb-0.5 d-flex align-items-center gap-1 opacity-75" style="font-size: 0.65rem;">
                    <span class="font-monospace text-white-50">{{ message.created_at|date:"H:i" }}</span>
                    <i class="bi bi-check2-all text-info"></i>
                </div>
            </div>
        {% else %}
            <div class="align-self-start p-2 shadow-sm border position-relative" style="background-color: var(--card-bg) !important; border-color: var(--border-line) !important; max-width: 85%; min-width: 110px; border-radius: 0px 12px 12px 12px; padding-bottom: 20px !important;">
                <p class="m-0 pe-2" style="font-size: 0.92rem; line-height: 1.4; color: var(--text-main) !important;">{{ message.message_text }}</p>
                <div class="position-absolute bottom-0 end-0 pe-2 pb-0.5 font-monospace" style="font-size: 0.65rem; color: var(--text-muted) !important;">
                    {{ message.created_at|date:"H:i" }}
                </div>
            </div>
        {% endif %}
    {% empty %}
        <div id="empty-state" class="text-center my-auto py-5">
            <i class="bi bi-chat-left-dots text-success fs-1 d-block mb-2 opacity-50"></i>
            <h6 class="fw-bold">No direct messages yet</h6>
        </div>
    {% endfor %}
</div>

<form id="chat-form" method="POST" class="p-2 bg-dark d-flex align-items-center gap-2 rounded-bottom-4 m-0" style="background-color: #161920 !important; border-top: 1px solid var(--border-line) !important;">
    {% csrf_token %}
    <button type="button" class="btn btn-link text-muted p-1" aria-label="Attach File"><i class="bi bi-paperclip fs-5"></i></button>
    <input type="text" id="chat-input" name="message_text" class="form-control form-control-sm border-0 text-white bg-secondary bg-opacity-25 py-2 rounded-4" placeholder="Type message directly..." style="font-size: 0.9rem;" required autocomplete="off">
    <button type="submit" class="btn btn-success rounded-circle d-flex align-items-center justify-content-center p-2 shadow" style="width: 38px; height: 38px; background-color: #198754 !important; border: none;" aria-label="Send Message">
        <i class="bi bi-send-fill text-white fs-6"></i>
    </button>
</form>

<script>
    const corridor = document.getElementById('msg-corridor');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    
    // Auto-scroll to lowest message boundary
    corridor.scrollTop = corridor.scrollHeight;

    // 1. ASYNCHRONOUS SUBMIT PIPELINE
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const text = input.value.trim();
        if(!text) return;

        const formData = new FormData(form);

        // Instantly append local bubble preview for zero-latency feedback loop
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        
        const previewBubble = `
            <div class="align-self-end p-2 shadow-sm position-relative text-white animate-fade-in" style="background-color: #115e3b !important; max-width: 85%; min-width: 110px; border-radius: 12px 0px 12px 12px; padding-bottom: 20px !important;">
                <p class="m-0 pe-2 text-white" style="font-size: 0.92rem; line-height: 1.4; color: #ffffff !important;">${text}</p>
                <div class="position-absolute bottom-0 end-0 pe-2 pb-0.5 d-flex align-items-center gap-1 opacity-75" style="font-size: 0.65rem;">
                    <span class="font-monospace text-white-50">${timeStr}</span>
                    <i class="bi bi-check2"></i>
                </div>
            </div>`;
        
        const emptyState = document.getElementById('empty-state');
        if(emptyState) emptyState.remove();
        
        corridor.insertAdjacentHTML('beforeend', previewBubble);
        corridor.scrollTop = corridor.scrollHeight;
        input.value = '';

        // Deliver background POST operation request container payload
        fetch(window.location.href, {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
    });

    // 2. RUN BACKGROUND TIMEOUT LOOP POLLING FOR NEW INBOUND MESSAGES
    setInterval(function() {
        fetch(window.location.href + '&sync=true', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(data => {
            if(data.html) {
                // If new message lengths differ, inject dynamic elements
                const currentBubbles = corridor.querySelectorAll('.align-self-start').length;
                if(data.inbound_count > currentBubbles) {
                    corridor.innerHTML = data.html;
                    corridor.scrollTop = corridor.scrollHeight;
                }
            }
            // 🔴 Sync Chat Badge counters globally inside base app layout navigation bars instantly
            const badges = document.querySelectorAll('.badge.bg-danger');
            badges.forEach(badge => {
                if(data.unread_total > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = data.unread_total;
                } else {
                    badge.style.display = 'none';
                }
            });
        });
    }, 3000); // Dynamic checks fire cleanly every 3 seconds context windows
</script>
