{% for message in messages_list %}
    {% if message.sender == request.user %}
    <div class="align-self-end shadow-sm text-white px-3 py-2" style="background:#198754; border-radius:14px 14px 0 14px; max-width:85%;">
        {{ message.message_text }}
        <div class="text-end mt-1" style="font-size:0.7rem;">
            {{ message.created_at|date:"H:i" }}
            <span class="{% if message.is_read %}text-warning{% else %}text-light{% endif %}">✓✓</span>
        </div>
    </div>
    {% else %}
    <div class="align-self-start shadow-sm border px-3 py-2" style="background:var(--card-bg); border-color:var(--border-line)!important; border-radius:0 14px 14px 14px; max-width:85%;">
        {{ message.message_text }}
        <div class="text-end mt-1 text-muted" style="font-size:0.7rem;">{{ message.created_at|date:"H:i" }}</div>
    </div>
    {% endif %}
{% empty %}
    <div id="empty-state-wrapper" class="text-center py-5">
        <i class="bi bi-chat-dots fs-1 text-success opacity-50"></i>
        <p class="text-muted">No messages yet.</p>
    </div>
{% endfor %}
