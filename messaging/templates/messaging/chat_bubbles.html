{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<div class="container px-2 pt-2" style="max-width: 650px;">
    <div id="chat-container" class="card border-0 rounded-4 shadow-sm overflow-hidden" style="height: calc(100vh - 170px);">

        <div class="px-3 py-3 border-bottom d-flex justify-content-between align-items-center" style="background:#161920;">
            <div class="d-flex align-items-center gap-2">
                <div class="bg-success rounded-circle text-white fw-bold d-flex align-items-center justify-content-center" style="width:45px;height:45px;">
                    {{ partner.username|slice:":1"|upper }}
                </div>
                <div>
                    <div class="fw-bold text-white">@{{ partner.username }}</div>
                    <small class="text-success">● Active now</small>
                </div>
            </div>
            <div class="d-flex gap-3">
                {% if partner.phone_number %}<a href="tel:{{ partner.phone_number }}" class="text-success"><i class="bi bi-telephone-fill"></i></a>{% endif %}
                <i class="bi bi-three-dots-vertical text-light"></i>
            </div>
        </div>

        <div id="chatBox" class="flex-grow-1 overflow-auto p-3 d-flex flex-column" 
             style="background-color:var(--bg-main); background-image: radial-gradient(rgba(25,135,84,.05) 1px, transparent 0); background-size:24px 24px;">
            {% include 'messaging/chat_bubbles.html' %}
        </div>

        <form id="chat-form" method="POST" class="border-top p-2">
            {% csrf_token %}
            <div class="input-group">
                <button type="button" class="btn btn-light"><i class="bi bi-paperclip"></i></button>
                <input type="text" name="message_text" id="chat-input" class="form-control rounded-start-pill" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" class="btn btn-success rounded-end-pill px-4"><i class="bi bi-send-fill"></i></button>
            </div>
        </form>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const chatForm = document.getElementById("chat-form");
    
    // Auto-scroll to bottom
    chatBox.scrollTop = chatBox.scrollHeight;

    // Real-time polling
    setInterval(() => {
        fetch(window.location.href + '&sync=true', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(data => {
            if (data.html && data.html.trim() !== chatBox.innerHTML.trim()) {
                chatBox.innerHTML = data.html;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }, 3000);
</script>
{% endblock %}
